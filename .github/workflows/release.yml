name: Release Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Determine version
        id: version
        run: |
          # Get the last semver tag, default to v0.0.0 if none
          LAST_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n1)
          LAST_TAG=${LAST_TAG:-v0.0.0}
          echo "Last tag: $LAST_TAG"

          # Strip the 'v' prefix and split into parts
          VERSION=${LAST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # Look at all commits since the last tag
          COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s %b" 2>/dev/null || git log --pretty=format:"%s %b")

          # Determine bump type by scanning commit messages
          BUMP="none

          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE:|^.+!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qiE "^fix(\(.+\))?:|^perf(\(.+\))?:"; then
            BUMP="patch"
          fi

          echo "Bump type: $BUMP"

          # Apply the bump
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          elif [ "$BUMP" = "patch" ]; then
            PATCH=$((PATCH + 1))
          else
            # No conventional commits found — default to patch bump
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          # Version code = unique integer for Play Store
          # Using commit count so it always increases
          VERSION_CODE=$(git rev-list --count HEAD)
          BASE_OFFSET=300
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION_CODE=$((BASE_OFFSET + COMMIT_COUNT))
          

          echo "version_name=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "New version: v$NEW_VERSION (code: $VERSION_CODE)"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo usermod -aG kvm $USER

      - name: Install PostHog CLI
        run: |
          npm install -g @posthog/cli
          posthog-cli --version

      - name: Generate Baseline Profile
        if: github.ref == 'refs/heads/main'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:generateReleaseBaselineProfile \
          -Pandroid.testoptions.manageddevices.emulator.gpu="swiftshader_indirect" \
          -PskipPostHog=true \
          --stacktrace

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          POSTHOG_CLI_HOST: https://us.posthog.com
          POSTHOG_CLI_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_CLI_API_KEY: ${{ secrets.POSTHOG_CLI_API_KEY }}
          POSTHOG_RELEASE: "MultipleAlarm_Native@${{ github.sha }}"
        run: |
          ./gradlew clean assembleRelease bundleRelease \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_name }} \
            "-Pandroid.injected.signing.store.file=$PWD/app/release.keystore" \
            "-Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD" \
            "-Pandroid.injected.signing.key.alias=$KEY_ALIAS" \
            "-Pandroid.injected.signing.key.password=$KEY_PASSWORD"

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
             "Multiple-Alarms-${{ steps.version.outputs.version_name }}.apk"

      - name: Rename AAB
        run: |
          cp app/build/outputs/bundle/release/app-release.aab \
             "Multiple-Alarms-${{ steps.version.outputs.version_name }}.aab"

      - name: Push Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.version.outputs.version_name }}"

          # Only push if tag doesn't exist yet
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version_name }}
          name: Release ${{ steps.version.outputs.version_name }}
          body: |
            ## Release ${{ steps.version.outputs.version_name }}

            ### Info
            - Version Name: ${{ steps.version.outputs.version_name }}
            - Version Code: ${{ steps.version.outputs.version_code }}
            - Commit: ${{ github.sha }}

            ### Downloads
            - **APK**: For direct installation on Android devices
            - **AAB**: For Google Play Store distribution
          files: |
            Multiple-Alarms-${{ steps.version.outputs.version_name }}.apk
            Multiple-Alarms-${{ steps.version.outputs.version_name }}.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Play Store Internal Track
        if: github.ref == 'refs/heads/main'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.coolApps.MultipleAlarmClock
          releaseFiles: Multiple-Alarms-${{ steps.version.outputs.version_name }}.aab
          track: internal
          status: completed

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Multiple-Alarms-${{ steps.version.outputs.version_name }}-APK
          path: Multiple-Alarms-${{ steps.version.outputs.version_name }}.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: Multiple-Alarms-${{ steps.version.outputs.version_name }}-AAB
          path: Multiple-Alarms-${{ steps.version.outputs.version_name }}.aab
          retention-days: 30
