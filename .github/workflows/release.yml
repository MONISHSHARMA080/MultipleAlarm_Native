name: Release Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Determine version
        id: version
        run: |
          # Get the last tag, default to v0 if none exists
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0")
          LAST_VERSION=${LAST_TAG#v}
          NEW_VERSION=$((LAST_VERSION + 1))
          
          echo "version_code=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_name=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: v$NEW_VERSION (code: $NEW_VERSION)"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Generate Baseline Profile
        run: |
          ./gradlew :app:generateBaselineProfile \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_name }}

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo usermod -aG kvm $USER

      - name: Generate Startup Profile
        run: |
          ./gradlew :app:generateReleaseStartupProfile \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_name }}

      - name: Build Release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_name }}

      - name: Build Release AAB
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_name }}

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
             "Multiple-Alarms-${{ steps.version.outputs.version_name }}.apk"

      - name: Rename AAB
        run: |
          cp app/build/outputs/bundle/release/app-release.aab \
             "Multiple-Alarms-${{ steps.version.outputs.version_name }}.aab"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version_name }}
          name: Release ${{ steps.version.outputs.version_name }}
          body: |
            ## Release ${{ steps.version.outputs.version_name }}
            
            ### What's Changed
            - Version Code: ${{ steps.version.outputs.version_code }}
            - Version Name: ${{ steps.version.outputs.version_name }}
            
            ### Downloads
            - **APK**: For direct installation on Android devices
            - **AAB**: For Google Play Store distribution
            
            Built with baseline and startup profiles for optimal performance.
          files: |
            Multiple-Alarms-${{ steps.version.outputs.version_name }}.apk
            Multiple-Alarms-${{ steps.version.outputs.version_name }}.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Multiple-Alarms-${{ steps.version.outputs.version_name }}-APK
          path: Multiple-Alarms-${{ steps.version.outputs.version_name }}.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: Multiple-Alarms-${{ steps.version.outputs.version_name }}-AAB
          path: Multiple-Alarms-${{ steps.version.outputs.version_name }}.aab
          retention-days: 30
