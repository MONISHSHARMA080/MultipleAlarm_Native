name: Android CI
on:
  push:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
                ~/.gradle/caches
                ~/.gradle/wrapper
          key: gradle-main-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
              gradle-main-

      - name: Calculate Version Code
        id: version
        run: |
          # Try to get the last version tag
          LAST_VERSION_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1 || echo "")
          
          if [ -z "$LAST_VERSION_TAG" ]; then
            VERSION_CODE=1
          else
            # Extract version code from last tag (assumes format like v2024.01.19-1234-vc42)
            LAST_VERSION_CODE=$(echo "$LAST_VERSION_TAG" | grep -oP 'vc\K[0-9]+' || echo "0")
            VERSION_CODE=$((LAST_VERSION_CODE + 1))
          fi
          
          # Generate version name with timestamp
          VERSION_NAME="Version: ${VERSION_CODE}"
          VERSION_TAG="v${VERSION_CODE}"
          
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION_TAG (code: $VERSION_CODE, name: $VERSION_NAME)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        env:
          AKS_AKS: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          chmod +x gradlew
          echo "First 4 characters of the AKS secret: ${AKS_AKS:0:4}**"

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app
          echo "$ENCODED_KEYSTORE" | base64 --decode > app/release.keystore
          ls -l app/release.keystore

      - name: Install PostHog CLI
        run: |
          npm install -g @posthog/cli;
          posthog-cli --version

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo usermod -aG kvm $USER

      # Install system image for Gradle Managed Device
      - name: Install Android SDK System Image
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --install "system-images;android-31;google_apis;x86_64"
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses


      - name: Generate Baseline Profile
        if: github.ref == 'refs/heads/main'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:generateReleaseBaselineProfile \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            -PskipPostHog=true \
            --stacktrace

      - name: Check Files
        run: tree

      - name: Build and Sign APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          POSTHOG_CLI_HOST: https://us.posthog.com
          POSTHOG_CLI_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_CLI_API_KEY: ${{ secrets.POSTHOG_CLI_API_KEY }}
          POSTHOG_RELEASE: "MultipleAlarm_Native@${{ github.sha }}"
        run: |
          ./gradlew clean assembleRelease bundleRelease \
          "-Pandroid.injected.signing.store.file=$PWD/app/release.keystore" \
          "-Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD" \
          "-Pandroid.injected.signing.key.alias=$KEY_ALIAS" \
          "-Pandroid.injected.signing.key.password=$KEY_PASSWORD" \
          "-PversionCode=$VERSION_CODE" \
          "-PversionName=$VERSION_NAME"

      - name: Debug PostHog map ID state
        run: |
          find app/build -name "posthog-proguard-map-id.properties" -print -exec cat {} \;
          find app/build -name "mapping.txt" -print | head -5

      - name: Debug PostHog map ID state
        if: failure()
        run: |
          find app/build -name "posthog-proguard-map-id.properties" -print -exec cat {} \;
          find app/build -name "mapping.txt" -print | head -5
          md5sum app/build/outputs/mapping/release/mapping.txt
          wc -l app/build/outputs/mapping/release/mapping.txt



      - name: Prepare Apk & AAB
        run: |
          # 1. Search for the actual APK file generated in the release folder
          # We look for any .apk file in the release directory to avoid hardcoding names
               APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" -type f | head -n 1)
               APK_FILENAME=$(basename "$APK_PATH")
          
          # 2. Search for the actual AAB file
               AAB_PATH=$(find app/build/outputs/bundle/release/ -name "*.aab" -type f | head -n 1)
               AAB_FILENAME=$(basename "$AAB_PATH")

          # 3. Save the actual paths and names to GITHUB_ENV for later steps
               echo "FINAL_APK_PATH=$APK_PATH" >> $GITHUB_ENV
               echo "FINAL_APK_NAME=$APK_FILENAME" >> $GITHUB_ENV
               
               echo "FINAL_AAB_PATH=$AAB_PATH" >> $GITHUB_ENV
               echo "FINAL_AAB_NAME=$AAB_FILENAME" >> $GITHUB_ENV
               
               echo "Successfully located APK: $APK_FILENAME"
               echo "Successfully located AAB: $AAB_FILENAME"


      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION_TAG }}
          name: Release ${{ steps.version.outputs.VERSION_TAG }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/${{ env.FINAL_APK_NAME }}
            app/build/outputs/bundle/release/${{ env.FINAL_AAB_NAME }}
          body: |
            ## Release ${{ steps.version.outputs.VERSION_TAG }}
            **Version Code:** ${{ steps.version.outputs.VERSION_CODE }}
            **Version Name:** ${{ steps.version.outputs.VERSION_NAME }}
            
            Built from commit: ${{ github.sha }}
            
            ${{ github.ref == 'refs/heads/main' && '**Includes:** APK + AAB with Startup Profile' || '**Includes:** APK only (dev build)' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.version.outputs.VERSION_TAG }}
          path: |
            echo "Checking APK path: app/build/outputs/apk/release/${{ env.FINAL_APK_NAME }}"
            ls -lh app/build/outputs/apk/release/
            echo "Checking AAB path: app/build/outputs/bundle/release/${{ env.FINAL_AAB_NAME }}"
            ls -lh app/build/outputs/bundle/release/
            app/build/outputs/apk/release/${{ env.FINAL_APK_NAME }}
            app/build/outputs/bundle/release/${{ env.FINAL_AAB_NAME }}
          retention-days: 3