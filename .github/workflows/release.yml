name: Release Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Determine version
        id: version
        run: |
          # Get the last tag, default to v0 if none exists
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0")
          LAST_VERSION=${LAST_TAG#v}
          NEW_VERSION=$((LAST_VERSION + 1))
          
          echo "version_code=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_name=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: v$NEW_VERSION (code: $NEW_VERSION)"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo usermod -aG kvm $USER

      - name: Install PostHog CLI
        run: |
          npm install -g @posthog/cli;
          posthog-cli --version

      - name: Generate Baseline Profile
        if: github.ref == 'refs/heads/main'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # 1. Add Android platform-tools (adb) to PATH
               export PATH=$PATH:$ANDROID_HOME/platform-tools

          # 2. Start logcat in the background. 
          # We use a loop to keep it alive because GMD emulators 
          # can take a moment to be 'visible' to ADB.
               (
               echo "Waiting for device to capture logs..."
          # This waits until any device/emulator is detected
               adb wait-for-device
               echo "Device detected. Starting AAAAA log capture."
               adb logcat AAAAA:V *:S > custom_logs.txt
               ) &
               LOGCAT_PID=$!

          # 3. Run the profile generation
          # We wrap this in a subshell or use 'set +e' if we want to ensure 
          # logs show even if the build fails, but here we keep it standard.
               ./gradlew :app:generateReleaseBaselineProfile \
               -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
               -PskipPostHog=true \
               --stacktrace

          # 4. Wait a few seconds for logs to flush, then kill the process
               sleep 5
               kill $LOGCAT_PID || true

          # 5. Print the logs to the GitHub console with clear separators
               echo ""
               echo "===================================================="
               echo "            APP LOGS (TAG: AAAAA)                   "
               echo "===================================================="
               if [ -f custom_logs.txt ]; then
               cat custom_logs.txt
               else
               echo "No custom_logs.txt was generated. Check if Log.d was called."
               fi
               echo "===================================================="
               echo ""

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          POSTHOG_CLI_HOST: https://us.posthog.com
          POSTHOG_CLI_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_CLI_API_KEY: ${{ secrets.POSTHOG_CLI_API_KEY }}
          POSTHOG_RELEASE: "MultipleAlarm_Native@${{ github.sha }}"
        run: |
          ./gradlew clean assembleRelease bundleRelease \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_name }} \
            "-Pandroid.injected.signing.store.file=$PWD/app/release.keystore" \
            "-Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD" \
            "-Pandroid.injected.signing.key.alias=$KEY_ALIAS" \
            "-Pandroid.injected.signing.key.password=$KEY_PASSWORD"

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
             "Multiple-Alarms-${{ steps.version.outputs.version_name }}.apk"

      - name: Rename AAB
        run: |
          cp app/build/outputs/bundle/release/app-release.aab \
             "Multiple-Alarms-${{ steps.version.outputs.version_name }}.aab"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version_name }}
          name: Release ${{ steps.version.outputs.version_name }}
          body: |
            ## Release ${{ steps.version.outputs.version_name }}
            
            ### What's Changed
            - Version Code: ${{ steps.version.outputs.version_code }}
            - Version Name: ${{ steps.version.outputs.version_name }}
            
            ### Downloads
            - **APK**: For direct installation on Android devices
            - **AAB**: For Google Play Store distribution
            
            Built with baseline and startup profiles for optimal performance.
          files: |
            Multiple-Alarms-${{ steps.version.outputs.version_name }}.apk
            Multiple-Alarms-${{ steps.version.outputs.version_name }}.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Multiple-Alarms-${{ steps.version.outputs.version_name }}-APK
          path: Multiple-Alarms-${{ steps.version.outputs.version_name }}.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: Multiple-Alarms-${{ steps.version.outputs.version_name }}-AAB
          path: Multiple-Alarms-${{ steps.version.outputs.version_name }}.aab
          retention-days: 30
