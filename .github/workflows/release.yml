name: Android CI
on:
  push:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-main-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-main-

      - name: Android build cache
        uses: actions/cache@v4
        with:
          path: |
            app/build
          key: build-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/*.kt', '**/*.java') }}
          restore-keys: |
            build-

      - name: Calculate Version Code
        id: version
        run: |
          # Get last tag matching v<number> pattern (e.g. v128)
          LAST_VERSION_TAG=$(git tag -l "v[0-9]*" --sort=-v:refname | head -n 1 || echo "")

          if [ -z "$LAST_VERSION_TAG" ]; then
            VERSION_CODE=1
          else
            # Extract the number directly from tags like v128
            LAST_VERSION_CODE=$(echo "$LAST_VERSION_TAG" | grep -oP 'v\K[0-9]+' || echo "0")
            VERSION_CODE=$((LAST_VERSION_CODE + 1))
          fi

          VERSION_NAME="v${VERSION_CODE}"
          VERSION_TAG="v${VERSION_CODE}"

          echo "VERSION_CODE=$VERSION_CODE"    >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$VERSION_NAME"    >> $GITHUB_OUTPUT
          echo "VERSION_TAG=$VERSION_TAG"      >> $GITHUB_OUTPUT
          echo "IS_MAIN=${{ github.ref == 'refs/heads/main' }}" >> $GITHUB_OUTPUT

          echo "Building: tag=$VERSION_TAG code=$VERSION_CODE name=$VERSION_NAME"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        env:
          AKS_AKS: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          chmod +x gradlew
          echo "First 4 chars of keystore secret: ${AKS_AKS:0:4}**"

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app
          echo "$ENCODED_KEYSTORE" | base64 --decode > app/release.keystore
          ls -l app/release.keystore

      - name: Install PostHog CLI
        run: |
          npm install -g @posthog/cli
          posthog-cli --version

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo usermod -aG kvm $USER

      - name: Install Android SDK System Image
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --install "system-images;android-31;google_apis;x86_64"
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Generate Baseline Profile
        if: github.ref == 'refs/heads/main'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:generateReleaseBaselineProfile \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            -PskipPostHog=true \
            --stacktrace

      - name: Check Files
        run: tree

      - name: Stamp proguard with git SHA
        run: |
          echo "# Build: ${{ github.sha }}" >> app/proguard-rules.pro

      # On main: build APK + AAB. On other branches: APK only.
      - name: Build and Sign APK (all branches)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          POSTHOG_CLI_HOST: https://us.posthog.com
          POSTHOG_CLI_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_CLI_API_KEY: ${{ secrets.POSTHOG_CLI_API_KEY }}
          POSTHOG_RELEASE: "MultipleAlarm_Native@${{ github.sha }}"
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            -PversionCode=$VERSION_CODE \
            -PversionName=$VERSION_NAME

      - name: Build and Sign AAB (main only)
        if: github.ref == 'refs/heads/main'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          POSTHOG_CLI_HOST: https://us.posthog.com
          POSTHOG_CLI_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_CLI_API_KEY: ${{ secrets.POSTHOG_CLI_API_KEY }}
          POSTHOG_RELEASE: "MultipleAlarm_Native@${{ github.sha }}"
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            -PversionCode=$VERSION_CODE \
            -PversionName=$VERSION_NAME

      - name: Debug PostHog map ID state
        run: |
          find app/build -name "posthog-proguard-map-id.properties" -print -exec cat {} \;
          find app/build -name "mapping.txt" -print | head -5

      - name: Debug PostHog map ID state (on failure)
        if: failure()
        run: |
          find app/build -name "posthog-proguard-map-id.properties" -print -exec cat {} \;
          find app/build -name "mapping.txt" -print | head -5
          md5sum app/build/outputs/mapping/release/mapping.txt
          wc -l app/build/outputs/mapping/release/mapping.txt

      # Rename to clean v128.apk / v128.aab style
      - name: Rename APK
        run: |
          VERSION_TAG="${{ steps.version.outputs.VERSION_TAG }}"
          APK_SRC="app/build/outputs/apk/release/app-release.apk"
          APK_DST="app/build/outputs/apk/release/MultipleAlarms-${VERSION_TAG}.apk"
          mv "$APK_SRC" "$APK_DST"
          echo "FINAL_APK=$APK_DST"     >> $GITHUB_ENV
          echo "FINAL_APK_NAME=MultipleAlarms-${VERSION_TAG}.apk" >> $GITHUB_ENV
          echo "Renamed APK → $APK_DST"

      - name: Rename AAB
        if: github.ref == 'refs/heads/main'
        run: |
          VERSION_TAG="${{ steps.version.outputs.VERSION_TAG }}"
          AAB_SRC="app/build/outputs/bundle/release/app-release.aab"
          AAB_DST="app/build/outputs/bundle/release/MultipleAlarms-${VERSION_TAG}.aab"
          mv "$AAB_SRC" "$AAB_DST"
          echo "FINAL_AAB=$AAB_DST"     >> $GITHUB_ENV
          echo "FINAL_AAB_NAME=MultipleAlarms-${VERSION_TAG}.aab" >> $GITHUB_ENV
          echo "Renamed AAB → $AAB_DST"

      # ── Release on main: APK + AAB ──────────────────────────────────────────
      - name: Create Release (main — APK + AAB)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION_TAG }}
          name: Release ${{ steps.version.outputs.VERSION_TAG }}
          draft: false
          prerelease: false
          files: |
            ${{ env.FINAL_APK }}
            ${{ env.FINAL_AAB }}
          body: |
            ## Release ${{ steps.version.outputs.VERSION_TAG }}

            **Version Code:** ${{ steps.version.outputs.VERSION_CODE }}
            **Version Name:** ${{ steps.version.outputs.VERSION_NAME }}

            Built from commit: ${{ github.sha }}

            **Includes:** APK + AAB with Baseline Profile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Release on other branches: APK only ─────────────────────────────────
      - name: Create Release (non-main — APK only)
        if: github.ref != 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION_TAG }}
          name: Release ${{ steps.version.outputs.VERSION_TAG }}
          draft: false
          prerelease: true
          files: |
            ${{ env.FINAL_APK }}
          body: |
            ## Release ${{ steps.version.outputs.VERSION_TAG }}

            **Version Code:** ${{ steps.version.outputs.VERSION_CODE }}
            **Version Name:** ${{ steps.version.outputs.VERSION_NAME }}

            Built from commit: ${{ github.sha }}

            **Includes:** APK only (non-main branch build)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload artifacts ─────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultipleAlarms-${{ steps.version.outputs.VERSION_TAG }}-apk
          path: ${{ env.FINAL_APK }}
          retention-days: 3

      - name: Upload AAB artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: MultipleAlarms-${{ steps.version.outputs.VERSION_TAG }}-aab
          path: ${{ env.FINAL_AAB }}
          retention-days: 3
